<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Studio Code</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
}
header{
    display:grid;
    grid-template-columns: auto 1fr auto;
    align-items:center;
    padding:20px 60px;
    background:white;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.logo{
    display:grid;
    grid-template-columns: auto 1fr;
    align-items:center;
}

.logo img{
    width:45px;
    margin-right:10px;
}

.logo h2{
    font-size:30px;
}

nav a{
    text-decoration:none;
    color:black;
    margin:15px;
    font-size:18px;
}

nav a:hover{
    color:#0078d4;
}

.download{
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.download:hover{
    background:#005fa3;
}

/* Hero Section */

.hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-top:60px;
    padding:0 20px;
}

.hero h1{
    font-size:70px;
    color:#111;
    margin-bottom:20px;
}

.hero p{
    font-size:30px;
    color:gray;
    margin-bottom:30px;
    max-width:800px;
}

.hero button{
    background:#1f1f1f;
    color:white;
    border:none;
    padding:18px 35px;
    border-radius:8px;
    font-size:22px;
    cursor:pointer;
}

.hero button:hover{
    background:black;
}

.hero img{
    width: 800px;
    max-width:100%;
    height:auto;
    margin-top:50px;
    border-radius:15px;
    box-shadow:0px 10px 20px rgba(0, 0, 0, 0.2);
}

</style>

</head>

<body>

<header>

    <div class="logo">
        <img src="https://code.visualstudio.com/assets/branding/code-stable.png" alt="VS Code Logo">
        <h2>Visual Studio Code</h2>
    </div>

    <nav>
        <a href="#">Features</a>
        <a href="#">Docs</a>
        <a href="#">Release Notes</a>
        <a href="#">Blog</a>
        <a href="#">Learn</a>
        <a href="#">Events</a>
        <a href="#">Resources</a>
    </nav>

    <button class="download">Download</button>

</header>

<section class="hero">

     <h1>The open source AI code editor</h1>

    <p>Your home for multi-agent development</p>
     
    <button>Download for Windows</button>
    <p style="margin-top: 25px;margin-bottom: 12px; font-size: 14px; color: gray;">Web,Insiders edition ,or other platforms</p>
    <p style="margin-top: 12px; margin-bottom:0px; font-size:14px; color: gray;">By using VS Code, you agree to the license terms and privacy policy.</p>
    <img src="heading.png.png" alt="VS Code Screenshot">
</section>

</body>
</html>
